<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zasady Serwera RP</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 0;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 60px;
    flex-wrap: wrap;
}

.box {
    background: #1e293b;
    padding: 30px;
    width: 250px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.box:hover {
    background: #334155;
    transform: scale(1.05);
}

.box h2 {
    margin-bottom: 10px;
}

.box p {
    font-size: 14px;
    color: #cbd5e1;
}
</style>
</head>

<body>

<header>📜 Zasady Serwera RP</header>

<div class="container">
    <a class="box" href="ZO/">
        <h2>Zasady ogólne</h2>
        <p>Podstawowe zasady serwera</p>
    </a>

    <a class="box" href="ZFP/">
        <h2>Frakcje państwowe</h2>
        <p>Goverment, National Guard</p>
    </a>

    <a class="box" href="ZFK/">
        <h2>Frakcje kryminalne</h2>
        <p>Gang, Kartel</p>
    </a>

    <a class="box" href="ZL/">
        <h2>Zasady Lidera</h2>
        <p>Obowiązki i zasady zarządzania frakcją</p>
    </a>
</div>

</body>
</html>
