<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zasady Serwera RP</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
}

/* MENU */
.sidebar{
    width:220px;
    background:#020617;
    height:100vh;
    padding:20px;
    position:fixed;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
    padding:10px;
    border-radius:6px;
}

.sidebar a:hover{
    background:#1e293b;
}

/* CONTENT */
.main{
    margin-left:240px;
    width:100%;
    padding:40px;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

.box{
    background:#1e293b;
    padding:30px;
    width:250px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.box:hover{
    background:#334155;
    transform:scale(1.05);
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>📂 Menu</h2>

    <a href="/">📜 Strona główna</a>
    <a href="ZO/">📘 Zasady ogólne</a>
    <a href="ZFP/">👮 Frakcje państwowe</a>
    <a href="ZFK/">💰 Frakcje kryminalne</a>
    <a href="ZL/">⭐ Zasady lidera</a>
</div>

<div class="main">

<h1>📜 Zasady Serwera RP</h1>

<div class="container">
    <a class="box" href="ZO/">
        <h2>Zasady ogólne</h2>
    </a>

    <a class="box" href="ZFP/">
        <h2>Frakcje państwowe</h2>
    </a>

    <a class="box" href="ZFK/">
        <h2>Frakcje kryminalne</h2>
    </a>

    <a class="box" href="ZL/">
        <h2>Zasady Lidera</h2>
    </a>
</div>

</div>

</body>
</html>
